<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 星露谷风格老爷爷：白发+眼镜+绿背心+书本 -->
  <!-- 头发 -->
  <rect x="8" y="2" width="16" height="4" fill="#e8e8e8"/>
  <rect x="6" y="4" width="20" height="4" fill="#ddd"/>
  <!-- 脸 -->
  <rect x="8" y="8" width="16" height="6" fill="#f5d6b0"/>
  <!-- 眼镜框 -->
  <rect x="8" y="10" width="4" height="3" fill="none" stroke="#8b6914" stroke-width="0.8"/>
  <rect x="14" y="10" width="4" height="3" fill="none" stroke="#8b6914" stroke-width="0.8"/>
  <rect x="12" y="11" width="2" height="1" fill="#8b6914"/>
  <!-- 眼睛 -->
  <rect x="9" y="11" width="2" height="2" fill="#2a2a2a"/>
  <rect x="15" y="11" width="2" height="2" fill="#2a2a2a"/>
  <!-- 胡子 -->
  <rect x="9" y="14" width="14" height="2" fill="#ccc" rx="1"/>
  <!-- 身体-绿背心 -->
  <rect x="6" y="18" width="20" height="8" fill="#4a7c4a" rx="2"/>
  <!-- 白衬衫领 -->
  <rect x="12" y="18" width="8" height="3" fill="#f5f5f0"/>
  <!-- 书本 -->
  <rect x="24" y="12" width="6" height="10" fill="#8b4513" rx="1"/>
  <rect x="25" y="13" width="4" height="8" fill="#f5f0dc"/>
  <line x1="27" y1="13" x2="27" y2="21" stroke="#ddd" stroke-width="0.5"/>
  <!-- 裤子 -->
  <rect x="8" y="26" width="6" height="4" fill="#5c4033"/>
  <rect x="16" y="26" width="6" height="4" fill="#5c4033"/>
</svg>
