<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岛主 DaoZhu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/sprite.css">
</head>
<body>
  <!-- 顶部标题栏 -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__icon">🏝️</span>
      <h1 class="topbar__title">岛主 DaoZhu</h1>
    </div>
    <div class="topbar__actions">
      <button class="btn-icon" id="btn-theme" title="切换主题" aria-label="切换主题">🌓</button>
      <button class="btn-icon" id="btn-settings" title="设置" aria-label="设置">⚙️</button>
    </div>
  </header>

  <!-- 主体三栏 -->
  <main class="workspace">
    <!-- 左侧面板 -->
    <aside class="sidebar" id="sidebar" aria-label="资源面板">
      <nav class="sidebar__tabs" role="tablist">
        <button class="tab active" role="tab" aria-selected="true" data-tab="buildings">🏠 建筑</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="skills">📖 技能</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="tools">🔧 工具</button>
      </nav>
      <div class="sidebar__content">
        <section class="tab-panel active" id="panel-buildings" role="tabpanel" aria-label="建筑列表">
          <div class="card-list" id="workspace-list"></div>
        </section>
        <section class="tab-panel" id="panel-skills" role="tabpanel" aria-label="技能列表">
          <div class="card-list" id="skill-list"></div>
        </section>
        <section class="tab-panel" id="panel-tools" role="tabpanel" aria-label="工具列表">
          <div class="card-list" id="tool-list"></div>
        </section>
      </div>
      <button class="sidebar__toggle" id="sidebar-toggle" aria-label="折叠侧栏">◀</button>
    </aside>

    <!-- 中间聊天区 -->
    <section class="chat" aria-label="聊天窗口">
      <div class="chat__messages" id="chat-messages" role="log" aria-live="polite">
        <!-- 消息动态渲染 -->
      </div>
      <form class="chat__input" id="chat-form" autocomplete="off">
        <textarea
          class="chat__textarea"
          id="chat-input"
          placeholder="输入消息，与管家对话..."
          rows="1"
          aria-label="消息输入框"
        ></textarea>
        <button class="chat__send" type="submit" aria-label="发送消息">发送</button>
      </form>
    </section>

    <!-- 右侧面板 -->
    <aside class="infopanel" id="infopanel" aria-label="信息面板">
      <nav class="infopanel__tabs" role="tablist">
        <button class="tab active" role="tab" aria-selected="true" data-tab="history">💬 历史</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="logs">📋 日志</button>
      </nav>
      <div class="infopanel__content">
        <section class="tab-panel active" id="panel-history" role="tabpanel" aria-label="历史对话">
          <div class="history-list" id="history-list"></div>
        </section>
        <section class="tab-panel" id="panel-logs" role="tabpanel" aria-label="输出日志">
          <div class="log-list" id="log-list"></div>
        </section>
      </div>
      <button class="infopanel__toggle" id="infopanel-toggle" aria-label="折叠面板">▶</button>
    </aside>
  </main>

  <!-- 底部状态栏 -->
  <footer class="statusbar">
    <span class="statusbar__info">
      <span class="librarian librarian--mini"><span class="librarian__pixel"></span></span>
      <span id="status-info">加载中...</span>
    </span>
    <span class="statusbar__version" id="status-version" title="点击检查更新"></span>
    <span class="statusbar__connection" id="status-connection">连接正常</span>
  </footer>

  <!-- JS 模块 -->
  <script src="js/api.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
