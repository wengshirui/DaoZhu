<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>背影 — 火柴人剧场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1c1814;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Noto Serif SC',serif}
.theater{width:920px;max-width:97vw}
.title-bar{text-align:center;padding:10px 0 6px;display:flex;justify-content:center;align-items:baseline;gap:14px}
.title-text{font-size:1.6rem;color:#c49a6c;letter-spacing:6px}
.stage{position:relative;border-radius:6px;overflow:hidden;border:3px solid #3d2b1f;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.stage canvas{display:block;width:100%;height:auto;background:#faf5ed}
.emoji-layer{position:absolute;inset:0;pointer-events:none;z-index:10}
.emoji-pop{position:absolute;font-size:1.8rem;animation:ePop 2.5s ease forwards;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.2))}
@keyframes ePop{0%{opacity:0;transform:scale(.3) translateY(10px)}15%{opacity:1;transform:scale(1.2) translateY(-5px)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-15px)}}
.dialogue-box{position:absolute;bottom:56px;left:0;right:0;background:rgba(255,255,255,0.95);padding:10px 24px;opacity:0;transition:opacity .4s;z-index:21;font-size:.85rem;line-height:1.5;border-top:2px solid #c49a6c}
.dialogue-box.show{opacity:1}
.dialogue-who{font-weight:bold;color:#b91c1c;margin-right:6px}
.narration{position:absolute;bottom:0;left:0;right:0;background:rgba(26,15,10,0.9);padding:10px 24px;color:#f0e6d6;font-size:.78rem;line-height:1.6;opacity:0;transition:opacity .5s;z-index:20;max-height:56px;overflow:hidden}
.narration.show{opacity:1}
.scene-label{position:absolute;top:10px;left:12px;background:rgba(139,26,26,0.8);color:#fff;padding:3px 10px;border-radius:10px;font-size:.65rem;z-index:15}
.controls{background:#1c1814;padding:10px 20px;display:flex;align-items:center;gap:14px;border-top:2px solid #2a1510;border-radius:0 0 6px 6px}
.scene-tag{background:#2a1510;color:#c49a6c;padding:4px 12px;border-radius:12px;font-size:.7rem;font-weight:bold}
.director-line{flex:1;color:#c0a080;font-size:.75rem}
#btn-replay{background:#c49a6c;color:#1a1a1a;border:none;padding:6px 16px;border-radius:14px;cursor:pointer;font-weight:bold;font-size:.8rem}
</style>
</head>
<body>
<div class="theater">
<div class="title-bar"><span class="title-text">背影</span></div>
<div class="stage" id="stage">
<canvas id="c" width="900" height="460"></canvas>
<div class="emoji-layer" id="emoji-layer"></div>
<div class="dialogue-box" id="dialogue-box"><span class="dialogue-who" id="dw"></span><span id="dt"></span></div>
<div class="narration" id="narration"></div>
<div class="scene-label" id="scene-label"></div>
</div>
<div class="controls">
<div class="scene-tag" id="scene-tag">0%</div>
<div class="director-line" id="dir">🎬 播放中...</div>
<button id="btn-replay">↻ 重播</button>
</div>
</div>
<script>
// 数据注入
const CHARS = {"wo": {"color": "#ec4899", "label": "我", "scale": 1}, "fuqin": {"color": "#7c3aed", "label": "父亲", "scale": 1}};
const TIMELINE = [{"t": 0, "action": "label", "text": "📍 北京寓所"}, {"t": 0, "action": "decor", "path": "nature/sky/cloud", "x": 200, "y": 50, "size": 60, "color": "#d1d5db"}, {"t": 0, "action": "decor", "path": "nature/sky/cloud", "x": 600, "y": 80, "size": 50, "color": "#d1d5db"}, {"t": 0, "action": "decor", "path": "props/items/book", "x": 400, "y": 300, "size": 40, "color": "#c49a6c"}, {"t": 0, "action": "decor", "path": "props/furniture/lamp-desk", "x": 700, "y": 200, "size": 50, "color": "#f59e0b"}, {"t": 0, "action": "enter", "id": "wo", "x": 400, "y": 280}, {"t": 500, "action": "arm", "id": "wo", "arm": "normal"}, {"t": 1000, "action": "narr", "text": "我与父亲不相见已二年余了，我最不能忘记的是他的背影。"}, {"t": 5000, "action": "narr", "text": "那年冬天，祖母死了，父亲的差使也交卸了，正是祸不单行的日子。"}, {"t": 9000, "action": "label", "text": "📍 徐州老家"}, {"t": 9000, "action": "decor_clear"}, {"t": 9000, "action": "decor", "path": "buildings/house", "x": 100, "y": 250, "size": 80, "color": "#6b7280"}, {"t": 9000, "action": "decor", "path": "nature/trees/tree-bare", "x": 700, "y": 200, "size": 70, "color": "#4b5563"}, {"t": 9000, "action": "decor", "path": "nature/sky/cloud", "x": 400, "y": 50, "size": 60, "color": "#9ca3af"}, {"t": 9000, "action": "enter", "id": "fuqin", "x": 600, "y": 280}, {"t": 10500, "action": "arm", "id": "fuqin", "arm": "normal"}, {"t": 11000, "action": "narr", "text": "到徐州见着父亲，看见满院狼藉的东西，又想起祖母，不禁簌簌地流下眼泪。"}, {"t": 15000, "action": "emoji", "id": "wo", "e": "😢"}, {"t": 15500, "action": "arm", "id": "wo", "arm": "hip"}, {"t": 16000, "action": "dialogue", "who": "父亲", "text": "事已如此，不必难过，好在天无绝人之路！"}, {"t": 20000, "action": "narr", "text": "回家变卖典质，父亲还了亏空；又借钱办了丧事。"}, {"t": 24000, "action": "narr", "text": "这些日子，家中光景很是惨淡，一半为了丧事，一半为了父亲赋闲。"}, {"t": 28000, "action": "narr", "text": "丧事完毕，父亲要到南京谋事，我也要回北京念书，我们便同行。"}, {"t": 32000, "action": "label", "text": "📍 南京车站"}, {"t": 32000, "action": "decor_clear"}, {"t": 32000, "action": "decor", "path": "buildings/landmark", "x": 400, "y": 150, "size": 100, "color": "#6b7280"}, {"t": 32000, "action": "decor", "path": "vehicles/train", "x": 100, "y": 350, "size": 80, "color": "#374151"}, {"t": 32000, "action": "decor", "path": "nature/sky/cloud", "x": 700, "y": 60, "size": 50, "color": "#d1d5db"}, {"t": 32000, "action": "enter", "id": "wo", "x": 300, "y": 280}, {"t": 33500, "action": "enter", "id": "fuqin", "x": 500, "y": 280}, {"t": 35000, "action": "narr", "text": "父亲因为事忙，本已说定不送我，叫旅馆里一个熟识的茶房陪我同去。"}, {"t": 39000, "action": "narr", "text": "他再三嘱咐茶房，甚是仔细。但他终于不放心，怕茶房不妥帖；颇踌躇了一会。"}, {"t": 43000, "action": "move", "id": "fuqin", "x": 400, "y": 280}, {"t": 44500, "action": "arm", "id": "fuqin", "arm": "point"}, {"t": 45000, "action": "dialogue", "who": "父亲", "text": "不要紧，他们去不好！"}, {"t": 49000, "action": "narr", "text": "我们过了江，进了车站。我买票，他忙着照看行李。"}, {"t": 53000, "action": "move", "id": "fuqin", "x": 600, "y": 280}, {"t": 54500, "action": "arm", "id": "fuqin", "arm": "normal"}, {"t": 55000, "action": "narr", "text": "行李太多了，得向脚夫行些小费，才可过去。他便又忙着和他们讲价钱。"}, {"t": 59000, "action": "narr", "text": "我那时真是聪明过分，总觉他说话不大漂亮，非自己插嘴不可。"}, {"t": 63000, "action": "move", "id": "wo", "x": 400, "y": 280}, {"t": 64500, "action": "arm", "id": "wo", "arm": "hip"}, {"t": 65000, "action": "narr", "text": "但他终于讲定了价钱；就送我上车。他给我拣定了靠车门的一张椅子。"}, {"t": 69000, "action": "move", "id": "fuqin", "x": 500, "y": 280}, {"t": 70500, "action": "arm", "id": "fuqin", "arm": "point"}, {"t": 71000, "action": "narr", "text": "他嘱我路上小心，夜里警醒些，不要受凉。又嘱托茶房好好照应我。"}, {"t": 75000, "action": "narr", "text": "我心里暗笑他的迂；他们只认得钱，托他们直是白托！"}, {"t": 79000, "action": "narr", "text": "唉，我现在想想，那时真是太聪明了！"}, {"t": 83000, "action": "emoji", "id": "wo", "e": "😔"}, {"t": 83500, "action": "dialogue", "who": "我", "text": "爸爸，你走吧。"}, {"t": 87500, "action": "move", "id": "fuqin", "x": 700, "y": 280}, {"t": 89000, "action": "arm", "id": "fuqin", "arm": "point"}, {"t": 89500, "action": "dialogue", "who": "父亲", "text": "我买几个橘子去。你就在此地，不要走动。"}, {"t": 93500, "action": "narr", "text": "我看见他戴着黑布小帽，穿着黑布大马褂，深青布棉袍，蹒跚地走到铁道边。"}, {"t": 97500, "action": "move", "id": "fuqin", "x": 800, "y": 280}, {"t": 99000, "action": "arm", "id": "fuqin", "arm": "up"}, {"t": 99500, "action": "narr", "text": "他用两手攀着上面，两脚再向上缩；他肥胖的身子向左微倾，显出努力的样子。"}, {"t": 103500, "action": "emoji", "id": "fuqin", "e": "💪"}, {"t": 104000, "action": "narr", "text": "这时我看见他的背影，我的泪很快地流下来了。"}, {"t": 108000, "action": "emoji", "id": "wo", "e": "😢"}, {"t": 108500, "action": "arm", "id": "wo", "arm": "hip"}, {"t": 109000, "action": "narr", "text": "我赶紧拭干了泪，怕他看见，也怕别人看见。"}, {"t": 113000, "action": "move", "id": "fuqin", "x": 200, "y": 280}, {"t": 114500, "action": "arm", "id": "fuqin", "arm": "normal"}, {"t": 115000, "action": "narr", "text": "过铁道时，他先将橘子散放在地上，自己慢慢爬下，再抱起橘子走。"}, {"t": 119000, "action": "move", "id": "fuqin", "x": 400, "y": 280}, {"t": 120500, "action": "move", "id": "wo", "x": 500, "y": 280}, {"t": 122000, "action": "arm", "id": "wo", "arm": "hug"}, {"t": 122500, "action": "narr", "text": "他和我走到车上，将橘子一股脑儿放在我的皮大衣上。"}, {"t": 126500, "action": "arm", "id": "fuqin", "arm": "normal"}, {"t": 127000, "action": "dialogue", "who": "父亲", "text": "我走了；到那边来信！"}, {"t": 131000, "action": "move", "id": "fuqin", "x": 800, "y": 280}, {"t": 132500, "action": "arm", "id": "fuqin", "arm": "wave"}, {"t": 133000, "action": "dialogue", "who": "父亲", "text": "进去吧，里边没人。"}, {"t": 137000, "action": "exit", "id": "fuqin"}, {"t": 138500, "action": "narr", "text": "等他的背影混入来来往往的人里，再找不着了，我便进来坐下，我的眼泪又来了。"}, {"t": 142500, "action": "emoji", "id": "wo", "e": "😭"}, {"t": 143000, "action": "arm", "id": "wo", "arm": "hip"}, {"t": 143500, "action": "label", "text": "📍 多年后"}, {"t": 143500, "action": "decor_clear"}, {"t": 143500, "action": "decor", "path": "nature/sky/sunset", "x": 400, "y": 50, "size": 80, "color": "#f59e0b"}, {"t": 143500, "action": "decor", "path": "nature/trees/tree-deciduous", "x": 100, "y": 200, "size": 70, "color": "#4b5563"}, {"t": 143500, "action": "decor", "path": "nature/trees/tree-deciduous", "x": 700, "y": 200, "size": 70, "color": "#4b5563"}, {"t": 143500, "action": "enter", "id": "wo", "x": 400, "y": 280}, {"t": 145000, "action": "arm", "id": "wo", "arm": "normal"}, {"t": 145500, "action": "narr", "text": "近几年来，父亲和我都是东奔西走，家中光景是一日不如一日。"}, {"t": 149500, "action": "narr", "text": "他少年出外谋生，独力支持，做了许多大事。那知老境却如此颓唐！"}, {"t": 153500, "action": "narr", "text": "他触目伤怀，自然情不能自已。情郁于中，自然要发之于外；家庭琐屑便往往触他之怒。"}, {"t": 157500, "action": "narr", "text": "但最近两年的不见，他终于忘却我的不好，只是惦记着我，惦记着我的儿子。"}, {"t": 161500, "action": "narr", "text": "我北来后，他写了一信给我，信中说道："}, {"t": 165500, "action": "dialogue", "who": "父亲", "text": "我身体平安，惟膀子疼痛利害，举箸提笔，诸多不便，大约大去之期不远矣。"}, {"t": 169500, "action": "narr", "text": "我读到此处，在晶莹的泪光中，又看见那肥胖的，青布棉袍，黑布马褂的背影。"}, {"t": 173500, "action": "emoji", "id": "wo", "e": "😢"}, {"t": 174000, "action": "arm", "id": "wo", "arm": "hip"}, {"t": 174500, "action": "narr", "text": "唉！我不知何时再能与他相见！"}, {"t": 178500, "action": "end"}];
// 自动修正：如果时间轴用的是秒（最大值<500），转为毫秒
if (TIMELINE.length > 0 && Math.max(...TIMELINE.map(e=>e.t)) < 500) {
    TIMELINE.forEach(e => { e.t = Math.round(e.t * 1000); });
}
</script>
<script>
// 火柴人剧场引擎（内嵌版）
(function(){

// ── SVG 素材系统 ──────────────────────────────────
const SVG_ASSETS_BASE = '../assets/';
const svgCache = {};

async function loadSVG(path, color) {
  const cacheKey = path + '|' + (color || '');
  if (svgCache[cacheKey]) return svgCache[cacheKey];
  try {
    const resp = await fetch(SVG_ASSETS_BASE + path + '.svg');
    if (!resp.ok) return null;
    let svg = await resp.text();
    if (color) {
      svg = svg.replace(/stroke="currentColor"/g, `stroke="${color}"`);
    }
    const img = new Image();
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    await new Promise(r => { img.onload = r; });
    svgCache[cacheKey] = img;
    return img;
  } catch(e) {
    console.warn('SVG load failed:', path, e);
    return null;
  }
}

const decors = [];

// ── 引擎核心 ──────────────────────────────────────
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),W=900,H=460;
const emojiLayer=document.getElementById('emoji-layer');
const dBox=document.getElementById('dialogue-box'),dw=document.getElementById('dw'),dt=document.getElementById('dt');
const narrEl=document.getElementById('narration'),labelEl=document.getElementById('scene-label');
const tagEl=document.getElementById('scene-tag'),dirEl=document.getElementById('dir');

const actors={};
function initActors(){for(const id of Object.keys(CHARS)){actors[id]={x:-60,y:300,opacity:0,arm:'normal',scale:CHARS[id].scale||1,targetX:-60,targetY:300,targetOpacity:0};}}

function drawChar(id){
  const c=CHARS[id],a=actors[id];if(!a||a.opacity<.03)return;
  ctx.save();ctx.globalAlpha=a.opacity;
  const x=a.x,y=a.y,s=a.scale;
  ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(x,y-36*s,12*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=c.color;ctx.lineWidth=2.5*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y-24*s);ctx.lineTo(x,y+16*s);ctx.stroke();
  ctx.beginPath();
  const arm=a.arm;
  if(arm==='up'){ctx.moveTo(x-16*s,y-20*s);ctx.lineTo(x,y-12*s);ctx.lineTo(x+16*s,y-20*s)}
  else if(arm==='hip'){ctx.moveTo(x-14*s,y);ctx.lineTo(x-6*s,y-10*s);ctx.moveTo(x+6*s,y-10*s);ctx.lineTo(x+14*s,y)}
  else if(arm==='point'){ctx.moveTo(x-14*s,y+2*s);ctx.lineTo(x,y-10*s);ctx.lineTo(x+22*s,y-14*s)}
  else if(arm==='hug'){ctx.moveTo(x-18*s,y-4*s);ctx.lineTo(x,y-10*s);ctx.lineTo(x+18*s,y-4*s)}
  else if(arm==='wave'){ctx.moveTo(x-14*s,y+2*s);ctx.lineTo(x,y-10*s);ctx.lineTo(x+18*s,y-24*s)}
  else{ctx.moveTo(x-14*s,y+4*s);ctx.lineTo(x,y-10*s);ctx.lineTo(x+14*s,y+4*s)}
  ctx.stroke();
  ctx.beginPath();
  if(Math.abs(a.x-a.targetX)>3){const t=Date.now()*.006;ctx.moveTo(x-10*s+Math.sin(t)*5*s,y+34*s);ctx.lineTo(x,y+16*s);ctx.lineTo(x+10*s-Math.sin(t)*5*s,y+34*s)}
  else{ctx.moveTo(x-10*s,y+34*s);ctx.lineTo(x,y+16*s);ctx.lineTo(x+10*s,y+34*s)}
  ctx.stroke();
  ctx.font=`bold ${9*s}px sans-serif`;ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillText(c.label,x,y-52*s);
  ctx.restore();
}

function drawDecor() {
  for (const d of decors) {
    if (!d.img) continue;
    const t = d.totalTime ? Date.now() - d.totalTime : 0;
    const fade = Math.min(1, t / 500); // 淡入
    ctx.save();
    ctx.globalAlpha = (d.alpha || 0.6) * fade;
    ctx.drawImage(d.img, d.x - d.size/2, d.y - d.size/2, d.size, d.size);
    ctx.restore();
  }
}

function drawBg(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#fef3c7');g.addColorStop(.55,'#fde68a');g.addColorStop(.56,'#92400e');g.addColorStop(1,'#78350f');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#7c2d12';ctx.fillRect(50,30,14,H-70);ctx.fillRect(W-64,30,14,H-70);
  ctx.strokeStyle='rgba(0,0,0,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=55){ctx.beginPath();ctx.moveTo(x,H*.56);ctx.lineTo(x,H);ctx.stroke()}
}

function popEmoji(e,id){
  const a=actors[id];if(!a||a.opacity<.1)return;
  const el=document.createElement('div');el.className='emoji-pop';el.textContent=e;
  el.style.left=(a.x/W*100)+'%';el.style.top=((a.y-70)/H*100)+'%';
  emojiLayer.appendChild(el);setTimeout(()=>el.remove(),2600);
}

function addDecor(ev) {
  // 懒加载：触发 decor action 时才开始异步加载
  const d = { x: ev.x, y: ev.y, size: ev.size || 48, alpha: ev.alpha != null ? ev.alpha : 0.65, img: null, totalTime: null };
  decors.push(d);
  loadSVG(ev.path, ev.color || '#4a3728').then(img => {
    d.img = img;
    d.totalTime = Date.now();
  });
}

function clearDecors() {
  decors.length = 0;
}

// 预加载所有 decor（在 start 时调用）
async function preloadDecors() {
  const paths = TIMELINE.filter(e => e.action === 'decor').map(e => e.path);
  const uniquePaths = [...new Set(paths)];
  await Promise.all(uniquePaths.map(p => loadSVG(p, null)));
}

function showD(who,text){if(!text){dBox.classList.remove('show');return}
// 如果 who 是英文 id，自动转为中文 label
if(who && CHARS[who]) who = CHARS[who].label;
dw.textContent=who?who+'：':'';dt.textContent=text;dBox.classList.add('show')}
function showN(text){narrEl.textContent=text||'';narrEl.classList.toggle('show',!!text)}

let startTime=0,nextIdx=0,playing=false;
function processEvents(){
  if(!playing)return;const elapsed=Date.now()-startTime;
  while(nextIdx<TIMELINE.length&&TIMELINE[nextIdx].t<=elapsed){
    const ev=TIMELINE[nextIdx];
    switch(ev.action){
      case'enter':actors[ev.id].targetX=ev.x;actors[ev.id].targetY=ev.y;actors[ev.id].targetOpacity=1;break;
      case'exit':actors[ev.id].targetX=actors[ev.id].x>W/2?W+60:-60;actors[ev.id].targetOpacity=0;break;
      case'move':actors[ev.id].targetX=ev.x;if(ev.y)actors[ev.id].targetY=ev.y;break;
      case'arm':actors[ev.id].arm=ev.arm;break;
      case'emoji':popEmoji(ev.e,ev.id);break;
      case'dialogue':showD(ev.who,ev.text);break;
      case'narr':showN(ev.text);break;
      case'label':labelEl.textContent=ev.text;showD('','');break;
      case'decor':addDecor(ev);break;
      case'decor_clear':
        // 清除装饰（场景切换时用）
        decors.length = 0; break;
      case'end':playing=false;dirEl.textContent='🏁 全剧终';break;
    }
    nextIdx++;
  }
  if(playing){const total=TIMELINE[TIMELINE.length-1].t;tagEl.textContent=Math.min(100,Math.floor(elapsed/total*100))+'%'}
}
function updateActors(){for(const id of Object.keys(actors)){const a=actors[id];a.x+=(a.targetX-a.x)*.05;a.y+=(a.targetY-a.y)*.05;a.opacity+=(a.targetOpacity-a.opacity)*.05}}
function render(){processEvents();updateActors();drawBg();drawDecor();for(const id of Object.keys(actors))drawChar(id);requestAnimationFrame(render)}
function start(){initActors();emojiLayer.innerHTML='';showD('','');showN('');labelEl.textContent='';dirEl.textContent='🎬 播放中...';decors.length=0;preloadDecors().then(()=>{startTime=Date.now();nextIdx=0;playing=true})}
document.getElementById('btn-replay').addEventListener('click',start);
initActors();render();setTimeout(start,500);
})();
</script>
