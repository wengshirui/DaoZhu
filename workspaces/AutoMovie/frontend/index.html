<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 火柴人剧场</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🎭 火柴人剧场</h1>
            <p class="header__desc">输入故事文本，AI 自动生成火柴人动画</p>
        </header>

        <main class="main">
            <!-- 输入区 -->
            <section class="input-section">
                <div class="input-header">
                    <h2>📝 输入故事</h2>
                    <label class="upload-btn">
                        📂 上传 TXT
                        <input type="file" id="file-input" accept=".txt" hidden>
                    </label>
                </div>
                <input type="text" id="title-input" placeholder="动画标题（可选）" class="title-input">
                <textarea id="text-input" placeholder="在这里粘贴小说、散文、剧本...&#10;&#10;支持多角色对话，AI 会自动识别角色并分配颜色。" rows="10"></textarea>
                <div class="input-footer">
                    <span class="char-count" id="char-count">0 / 5000 字</span>
                    <button class="btn btn--primary" id="btn-generate">🎬 生成动画</button>
                </div>
                <div class="status" id="status"></div>
            </section>

            <!-- 作品列表 -->
            <section class="works-section">
                <h2>🎞️ 我的作品</h2>
                <div class="works-list" id="works-list"></div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
