<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>话剧导演MVP：小明起床开门</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #2a241a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        .stage {
            background: #5e3e28;
            padding: 20px;
            border-radius: 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #fdf0d8;
            box-shadow: inset 0 0 0 3px #ebc28e, 0 8px 18px black;
        }
        .director-panel {
            margin-top: 20px;
            background: #2a1f15;
            border-radius: 32px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .script {
            background: #ffefbf;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #472e1c;
            font-size: 1rem;
        }
        .action-line {
            background: #00000066;
            backdrop-filter: blur(4px);
            padding: 5px 16px;
            border-radius: 28px;
            color: #f7f0b2;
            font-family: monospace;
            font-size: 0.85rem;
        }
        button {
            background: #b87c45;
            border: none;
            padding: 6px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            font-size: 0.9rem;
            color: #271d12;
        }
        button:hover {
            background: #daa062;
            transform: scale(0.96);
        }
        .caption {
            margin-top: 12px;
            text-align: center;
            color: #eddbb0;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div>
    <div class="stage">
        <canvas id="stageCanvas" width="800" height="500" style="width:800px;height:500px"></canvas>
        <div class="director-panel">
            <div class="script">📜 剧本：小明早晨起床了，打开了门</div>
            <div class="action-line" id="directorNote">🎬 导演：场记板准备...</div>
            <button id="replayBtn">🎭 重新演绎</button>
        </div>
        <div class="caption">✨ 话剧式演绎 | 场景+实体+剧情 | 文字配合状态变化 ✨</div>
    </div>
</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('stageCanvas');
        const ctx = canvas.getContext('2d');
        const noteDiv = document.getElementById('directorNote');

        // 固定尺寸
        const W = 800, H = 500;

        // ========== 实体定义库 ==========
        // 实体1：小明 (人类)
        let xiaoming = {
            type: "human",
            name: "小明",
            x: 280,           // 床的位置附近
            y: 380,
            state: "lying",   // lying, sitting, standing, walking, opening_door
            facingRight: true,
            // 走路目标
            walkTargetX: null,
            walkSpeed: 2.5,
            // 开门动作标志
            doorOpenFlag: false
        };

        // 实体2：门 (具有开关方法)
        let door = {
            type: "door",
            name: "房门",
            x: 620,
            y: 270,
            width: 55,
            height: 130,
            isOpen: false,     // 关 false, 开 true
            // 方法：开门
            open: function() {
                if(!this.isOpen) {
                    this.isOpen = true;
                    noteDiv.innerHTML = "🚪 门实体执行：打开方法 → 房门缓缓敞开";
                }
            },
            close: function() {
                if(this.isOpen) {
                    this.isOpen = false;
                    noteDiv.innerHTML = "🚪 门实体执行：关闭方法";
                }
            }
        };

        // 场景物件（静态背景，仅作视觉）
        // 床
        const bed = { x: 190, y: 370, w: 110, h: 70 };

        // ========== 剧本分镜 (导演调度) ==========
        const scenes = [
            { id: 0, description: "🌅 第一幕：清晨，小明躺在床上睡觉。", actorAction: "wake", duration: 1500, note: "小明从睡梦中醒来" },
            { id: 1, description: "🛏️ 第二幕：小明坐起身，揉揉眼睛。", actorAction: "sit", duration: 1000, note: "小明坐起来" },
            { id: 2, description: "🧍 第三幕：小明站起来，走向房门。", actorAction: "walk_to_door", duration: 2000, note: "小明迈步走向门口" },
            { id: 3, description: "🚪 第四幕：小明伸手，打开房门。", actorAction: "open_door", duration: 1200, note: "小明转动把手，门打开了" },
            { id: 4, description: "✅ 落幕：门已打开，小明走出房间，新的一天开始。", actorAction: "finish", duration: 800, note: "表演结束" }
        ];

        let currentSceneIdx = 0;
        let sceneTimer = null;
        let walkingStartX = 0;
        let walkingProgress = 0;
        let walkingActive = false;

        // 重置全部状态
        function resetPerformance() {
            if(sceneTimer) clearTimeout(sceneTimer);
            // 重置小明
            xiaoming.state = "lying";
            xiaoming.x = 280;
            xiaoming.y = 380;
            xiaoming.walkTargetX = null;
            xiaoming.doorOpenFlag = false;
            walkingActive = false;
            // 重置门
            door.isOpen = false;
            // 重置场景索引
            currentSceneIdx = 0;
            noteDiv.innerHTML = "🎬 导演：重新开始，第一场！";
            // 开始执行第一幕
            executeScene(0);
        }

        // 执行一幕 (导演指令)
        function executeScene(index) {
            if(index >= scenes.length) {
                noteDiv.innerHTML = "🏁 全剧终：小明打开了门，迎接清晨 ☀️ 导演喊卡！";
                return;
            }
            const scene = scenes[index];
            noteDiv.innerHTML = `🎬 导演指令：${scene.note}`;

            // 根据 actorAction 改变实体状态
            switch(scene.actorAction) {
                case "wake":
                    xiaoming.state = "lying";
                    // 0.2秒后变为半醒
                    setTimeout(() => {
                        if(xiaoming.state === "lying") xiaoming.state = "sitting";
                    }, 400);
                    break;
                case "sit":
                    xiaoming.state = "sitting";
                    xiaoming.y = 372;
                    break;
                case "walk_to_door":
                    xiaoming.state = "walking";
                    xiaoming.y = 340;   // 站立高度
                    walkingStartX = xiaoming.x;
                    xiaoming.walkTargetX = door.x - 35;  // 走到门前
                    walkingActive = true;
                    walkingProgress = 0;
                    // 走路动画用 requestFrame 更新
                    break;
                case "open_door":
                    xiaoming.state = "opening_door";
                    // 开门方法调用门实体方法
                    door.open();
                    xiaoming.doorOpenFlag = true;
                    break;
                case "finish":
                    xiaoming.state = "idle";
                    break;
                default: break;
            }

            // 设置计时器进入下一幕
            if(sceneTimer) clearTimeout(sceneTimer);
            sceneTimer = setTimeout(() => {
                // 如果当前是走路，确保最终位置
                if(xiaoming.state === "walking") {
                    xiaoming.x = door.x - 35;
                    xiaoming.state = "standing";
                    walkingActive = false;
                }
                currentSceneIdx++;
                executeScene(currentSceneIdx);
            }, scene.duration);
        }

        // 更新走路插值 (每帧)
        function updateWalking() {
            if(walkingActive && xiaoming.state === "walking") {
                const totalDuration = 2000; // 毫秒，与场景时长匹配
                const startTime = window._walkStartTime || (window._walkStartTime = performance.now());
                const elapsed = performance.now() - startTime;
                let t = Math.min(1, elapsed / totalDuration);
                if(t >= 1) {
                    xiaoming.x = door.x - 35;
                    xiaoming.state = "standing";
                    walkingActive = false;
                    window._walkStartTime = null;
                } else {
                    const ease = easeOutCubic(t);
                    xiaoming.x = walkingStartX + (xiaoming.walkTargetX - walkingStartX) * ease;
                }
            } else {
                if(window._walkStartTime && !walkingActive) window._walkStartTime = null;
            }
        }

        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }

        // ========== 场景绘制 (话剧舞台布景) ==========
        function drawStage() {
            // 墙面
            ctx.fillStyle = "#FBE6B0";
            ctx.fillRect(0, 0, W, H);
            // 木地板
            ctx.fillStyle = "#D9AE6E";
            ctx.fillRect(0, 340, W, 160);
            for(let i=0;i<10;i++) {
                ctx.fillStyle = "#BA8748";
                ctx.fillRect(0, 352 + i*15, W, 2);
            }
            // 窗户 (清晨光)
            ctx.fillStyle = "#C2DFFF";
            ctx.fillRect(60, 60, 100, 90);
            ctx.fillStyle = "#FEE2A0";
            for(let s=0;s<5;s++) ctx.fillRect(75+s*12, 110, 6, 28);
            ctx.strokeStyle = "#AC7E4A";
            ctx.lineWidth = 3;
            ctx.strokeRect(60, 60, 100, 90);
            // 床
            ctx.fillStyle = "#B8824E";
            ctx.fillRect(bed.x, bed.y, bed.w, bed.h);
            ctx.fillStyle = "#E7BB81";
            ctx.fillRect(bed.x+12, bed.y-14, bed.w-24, 20);
            ctx.fillStyle = "#FADDA8";
            ctx.fillRect(bed.x+20, bed.y-8, bed.w-40, 12);
            ctx.fillStyle = "#AF7646";
            ctx.fillRect(bed.x+70, bed.y-4, 28, 14);

            // 门 (话剧风格：根据 isOpen 改变颜色/文字)
            const doorX = door.x, doorY = door.y;
            ctx.fillStyle = door.isOpen ? "#CAA66D" : "#9E7648";
            ctx.fillRect(doorX, doorY, door.width, door.height);
            ctx.fillStyle = "#DBB47A";
            ctx.fillRect(doorX+8, doorY+15, door.width-16, door.height-30);
            if(!door.isOpen) {
                ctx.fillStyle = "#EEC27A";
                ctx.beginPath();
                ctx.arc(doorX+door.width-12, doorY+70, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#7A562E";
                ctx.fillText("🔒", doorX+door.width-16, doorY+74);
            } else {
                // 开门效果: 绘制门折叠示意
                ctx.fillStyle = "#CCAF82";
                ctx.fillRect(doorX+8, doorY+12, door.width-10, door.height-20);
                ctx.fillStyle = "#EFDA99";
                ctx.fillText("🚪 门已打开", doorX+8, doorY+40);
            }

            // 标注实体名称 (话剧风格)
            ctx.font = "bold 14px 'Courier New'";
            ctx.fillStyle = "#573E28";
            ctx.fillText("【床】", bed.x+15, bed.y-8);
            ctx.fillText("【门】", doorX+5, doorY-8);
            // 小明名称
            ctx.fillStyle = "#1F3A2A";
            ctx.fillText("👤 小明", xiaoming.x-15, xiaoming.y-48);
        }

        // 绘制小明（话剧抽象风格，关注状态和文字）
        function drawXiaoming() {
            let baseX = xiaoming.x;
            let baseY = xiaoming.y;
            if(xiaoming.state === "standing" || xiaoming.state === "walking" || xiaoming.state === "opening_door" || xiaoming.state === "idle") baseY = 342;
            if(xiaoming.state === "sitting") baseY = 372;
            if(xiaoming.state === "lying") baseY = 390;

            // 身体圆形 + 衣服色块
            ctx.fillStyle = "#F9CEA0";
            ctx.beginPath();
            ctx.ellipse(baseX, baseY-30, 14, 17, 0, 0, Math.PI*2);
            ctx.fill();
            // 眼睛
            ctx.fillStyle = "#3D2618";
            ctx.beginPath();
            ctx.arc(baseX-6, baseY-36, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(baseX+6, baseY-36, 2, 0, Math.PI*2);
            ctx.fill();
            // 微笑 / 表情
            ctx.beginPath();
            ctx.arc(baseX, baseY-28, 6, 0.05, Math.PI-0.05);
            ctx.strokeStyle = "#B2592A";
            ctx.lineWidth = 1.8;
            ctx.stroke();
            // 睡帽 (如果躺着或刚醒)
            if(xiaoming.state === "lying" || xiaoming.state === "sitting") {
                ctx.fillStyle = "#A78154";
                ctx.fillRect(baseX-10, baseY-50, 20, 12);
                ctx.fillStyle = "#F0CF9A";
                ctx.fillRect(baseX-6, baseY-54, 12, 8);
            }
            // 衣服
            ctx.fillStyle = "#7FB07F";
            ctx.fillRect(baseX-12, baseY-18, 24, 28);
            // 裤子
            ctx.fillStyle = "#5D7440";
            ctx.fillRect(baseX-11, baseY+4, 22, 18);
            // 手部动作示意
            if(xiaoming.state === "walking") {
                ctx.fillStyle = "#F9CEA0";
                ctx.fillRect(baseX-18, baseY-12, 10, 8);
                ctx.fillRect(baseX+10, baseY-12, 10, 8);
            }
            if(xiaoming.state === "opening_door") {
                ctx.fillStyle = "#F2C289";
                ctx.fillRect(baseX+12, baseY-16, 14, 8);
                ctx.fillText("🚪", baseX+16, baseY-12);
            }
        }

        // 导演文字气泡 (根据当前剧情输出对话)
        let thoughtText = "";
        function updateThought() {
            if(currentSceneIdx === 0 && xiaoming.state === "lying") thoughtText = "🌙 天亮了...";
            else if(currentSceneIdx === 1 && xiaoming.state === "sitting") thoughtText = "😴 再坐一会儿...";
            else if(currentSceneIdx === 2 && xiaoming.state === "walking") thoughtText = "🚶‍♂️ 去开门吧";
            else if(currentSceneIdx === 3 && xiaoming.state === "opening_door") thoughtText = "🔓 把门打开...";
            else if(currentSceneIdx >= 4) thoughtText = "☀️ 门开了，新的一天！";
            else thoughtText = "";
        }

        function drawDialogue() {
            if(!thoughtText) return;
            ctx.font = "14px 'Segoe UI'";
            const metrics = ctx.measureText(thoughtText);
            const bubbleW = metrics.width + 20;
            ctx.fillStyle = "#FFF9E8";
            ctx.shadowBlur = 0;
            ctx.fillRect(xiaoming.x+8, xiaoming.y-68, bubbleW, 24);
            ctx.fillStyle = "#2F2A1F";
            ctx.fillText(thoughtText, xiaoming.x+16, xiaoming.y-51);
        }

        // 每帧渲染
        function animate() {
            updateWalking();
            updateThought();
            drawStage();
            drawXiaoming();
            drawDialogue();
            // 额外显示导演当前场次
            if(currentSceneIdx < scenes.length) {
                ctx.font = "italic 12px monospace";
                ctx.fillStyle = "#896B42";
                ctx.fillText(`🎬 第${currentSceneIdx+1}/${scenes.length}场 · ${scenes[currentSceneIdx]?.description || ""}`, 20, 40);
            } else {
                ctx.fillStyle = "#AF8750";
                ctx.fillText("✅ 表演完成 · 谢幕", 20, 40);
            }
            requestAnimationFrame(animate);
        }

        // 重置并开始
        function init() {
            resetPerformance();
        }

        document.getElementById('replayBtn').addEventListener('click', () => {
            if(sceneTimer) clearTimeout(sceneTimer);
            walkingActive = false;
            window._walkStartTime = null;
            resetPerformance();
        });

        init();
        animate();
    })();
</script>
</body>
</html>
