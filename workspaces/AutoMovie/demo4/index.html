<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背影 · 朱自清 — 混合实体剧场</title>
    <link rel="stylesheet" href="css/theater.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theater">
        <header class="theater-header">
            <div class="marquee">背 影</div>
            <div class="author">朱自清</div>
        </header>

        <div class="stage-frame">
            <div class="curtain-top"></div>
            <div class="stage-body">
                <div class="curtain-side left"></div>
                <div class="stage" id="stage">
                    <!-- Canvas 层：背景 + 核心角色 -->
                    <canvas id="canvas" width="900" height="460"></canvas>
                    <!-- SVG overlay 层：装饰图标 -->
                    <div class="svg-layer" id="svg-layer"></div>
                    <!-- UI 层 -->
                    <div class="bubble" id="bubble"></div>
                    <div class="narration" id="narration"></div>
                    <div class="scene-info" id="scene-info"></div>
                </div>
                <div class="curtain-side right"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel__scene">
                <span class="panel__label">SCENE</span>
                <span class="panel__value" id="panel-scene">1/8</span>
            </div>
            <div class="panel__note" id="panel-note">🎬 准备开演...</div>
            <button class="panel__btn" id="btn-replay">🎭 重新演绎</button>
        </div>
    </div>

    <script src="js/renderer.js"></script>
    <script src="js/script.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
