<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>话剧导演 · 智能实体剧场 v2</title>
    <link rel="stylesheet" href="css/stage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 剧场外框 -->
    <div class="theater">
        <!-- 顶部幕布装饰 -->
        <div class="curtain-top">
            <div class="curtain-drape left"></div>
            <div class="curtain-title">
                <span class="theater-sign">✦ 智能实体剧场 ✦</span>
            </div>
            <div class="curtain-drape right"></div>
        </div>

        <!-- 舞台主体 -->
        <div class="stage-wrapper">
            <!-- 左侧幕布 -->
            <div class="curtain-side left"></div>
            
            <!-- 舞台画布 -->
            <div class="stage-area">
                <canvas id="stageCanvas" width="900" height="520"></canvas>
                <!-- 聚光灯光晕 -->
                <div class="spotlight" id="spotlight"></div>
            </div>
            
            <!-- 右侧幕布 -->
            <div class="curtain-side right"></div>
        </div>

        <!-- 导演面板（场记板风格） -->
        <div class="director-board">
            <div class="clapperboard">
                <div class="clapper-top">
                    <div class="clapper-stripes"></div>
                </div>
                <div class="clapper-body">
                    <div class="clapper-info">
                        <span class="clapper-label">SCENE</span>
                        <span class="clapper-value" id="sceneNum">1/5</span>
                    </div>
                    <div class="clapper-info">
                        <span class="clapper-label">TAKE</span>
                        <span class="clapper-value" id="takeNum">1</span>
                    </div>
                </div>
            </div>
            <div class="director-note" id="directorNote">
                <span class="note-icon">🎬</span>
                <span class="note-text">导演：场记板准备...</span>
            </div>
            <button class="replay-btn" id="replayBtn">
                <span class="btn-icon">🎭</span>
                <span class="btn-text">重新演绎</span>
            </button>
        </div>

        <!-- 观众席剪影 -->
        <div class="audience">
            <div class="audience-row back"></div>
            <div class="audience-row front"></div>
        </div>
    </div>

    <script src="js/entities.js"></script>
    <script src="js/director.js"></script>
    <script src="js/stage.js"></script>
</body>
</html>
