<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤 天气查询</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-glow"></div>
            <div class="header-content">
                <h1>🌤 天气查询</h1>
                <p class="subtitle">全球天气，一触即达</p>
            </div>
        </header>

        <main class="main-content">
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" id="cityInput" placeholder="输入城市名，如 南京、Tokyo、London..." autocomplete="off">
                    <button id="searchBtn">查询天气</button>
                </div>
                <div class="quick-cities">
                    <button class="city-tag" data-city="南京">南京</button>
                    <button class="city-tag" data-city="北京">北京</button>
                    <button class="city-tag" data-city="上海">上海</button>
                    <button class="city-tag" data-city="深圳">深圳</button>
                    <button class="city-tag" data-city="成都">成都</button>
                    <button class="city-tag" data-city="杭州">杭州</button>
                    <button class="city-tag" data-city="东京">东京</button>
                    <button class="city-tag" data-city="纽约">纽约</button>
                    <button class="city-tag" data-city="伦敦">伦敦</button>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>正在获取天气数据...</p>
            </div>

            <div id="error" class="error hidden"></div>

            <div id="weatherCard" class="weather-card hidden">
                <div class="weather-main">
                    <div class="weather-left">
                        <div class="city-name" id="cityName">--</div>
                        <div class="country-name" id="countryName">--</div>
                        <div class="condition-badge" id="conditionBadge">--</div>
                    </div>
                    <div class="weather-temp">
                        <span class="temp-value" id="tempC">--</span>
                        <span class="temp-unit">°C</span>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-icon">🌡</div>
                        <div class="detail-info">
                            <span class="detail-label">体感温度</span>
                            <span class="detail-value" id="feelsLike">--°C</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💧</div>
                        <div class="detail-info">
                            <span class="detail-label">湿度</span>
                            <span class="detail-value" id="humidity">--%</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💨</div>
                        <div class="detail-info">
                            <span class="detail-label">风速</span>
                            <span class="detail-value" id="wind">-- km/h</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">👁</div>
                        <div class="detail-info">
                            <span class="detail-label">能见度</span>
                            <span class="detail-value" id="visibility">-- km</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">🔄</div>
                        <div class="detail-info">
                            <span class="detail-label">风向</span>
                            <span class="detail-value" id="windDir">--</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">☀️</div>
                        <div class="detail-info">
                            <span class="detail-label">紫外线</span>
                            <span class="detail-value" id="uvIndex">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="historySection" class="history-section hidden">
                <h3>📋 搜索历史</h3>
                <div id="historyList" class="history-list"></div>
            </div>
        </main>

        <footer class="footer">
            <p>数据来源：wttr.in · 岛主平台</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
