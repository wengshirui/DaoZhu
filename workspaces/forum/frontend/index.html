<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岛主论坛 🏝️</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🏝️ 岛主论坛</h1>
      <p class="header__desc">岛民交流，分享经验 · 数据来自 Gitee Issues</p>
    </header>

    <div class="toolbar">
      <button class="tab-btn active" data-state="open">🟢 开放中</button>
      <button class="tab-btn" data-state="closed">✅ 已关闭</button>
      <button class="btn btn--primary" id="btn-new">+ 发帖</button>
    </div>

    <main class="main">
      <div id="issue-list" class="issue-list"></div>
      <div id="issue-detail" class="issue-detail" style="display:none"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
